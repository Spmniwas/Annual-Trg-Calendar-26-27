<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPM Niwas Training Calendar Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>SPM Niwas Annual Training Calendar</h1>
        <p>Interactive Dashboard</p>
    </header>

    <main>
        <section style="margin-bottom: 20px;">
            <label for="scheme-select">Scheme: </label>
            <select id="scheme-select">
                <option value="all">All Schemes</option>
            </select>

            <label for="program-select" style="margin-left: 15px;">Program Name: </label>
            <select id="program-select">
                <option value="all">All Programs</option>
            </select>

            <label for="mode-select" style="margin-left: 15px;">Mode of Delivery: </label>
            <select id="mode-select">
                <option value="all">All Modes</option>
            </select>
        </section>

        <section>
            <table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%;">
                <thead>
                    <tr id="table-headers">
                        </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>
    </main>

</body>
</html>
