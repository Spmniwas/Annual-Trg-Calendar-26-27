<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPM NIWAS Training Calendar 2026-27</title>
    <!-- Add this line below to connect your CSS design -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>SPM NIWAS Annual Training Calendar</h1>
        <p>Interactive Dashboard</p>
    </header>

    <main>
        <section class="filter-container">
            <div class="filter-group">
                <label for="program-select">Program Name</label>
                <select id="program-select">
                    <option value="all">All Programs</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="mode-select">Mode of Delivery</label>
                <select id="mode-select">
                    <option value="all">All Modes</option>
                </select>
            </div>

            <div class="filter-group">
    <label for="status-select">Status</label>
    <select id="status-select">
        <option value="all">All Statuses</option>
        <option value="Upcoming" selected>Upcoming</option>
    </select>
</div>
            </div>
        </section>

        <section class="table-container">
            <table id="calendar-table">
                <thead>
                    <tr id="table-headers">
                        </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </section>
    </main>
<script src="app.js"></script>
</body>
</html>
