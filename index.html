<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPM NIWAS Training Calendar 2026-27</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>SPM NIWAS Annual Training Calendar</h1>
        <p>Interactive Dashboard</p>
    </header>

    <main>
        <section class="filter-container">
            <div class="filter-group">
                <label for="program-select">Program Name</label>
                <select id="program-select">
                    <option value="all">All Programs</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="mode-select">Mode of Delivery</label>
                <select id="mode-select">
                    <option value="all">All Modes</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="status-select">Status</label>
                <select id="status-select">
                    <option value="all">All Statuses</option>
                </select>
            </div>

            <div class="filter-group" style="flex-grow: 1; min-width: 250px;">
                <label for="search-input">Search Training</label>
                <input type="text" id="search-input" placeholder="Type any keyword (e.g., Solar, Online, JJM)..." style="padding: 10px 14px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; background-color: #fff; width: 100%; box-sizing: border-box;">
            </div>
        </section>

        <section class="table-container">
            <table id="calendar-table">
                <thead>
                    <tr id="table-headers">
                        </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>

            <div id="pagination-controls" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px;">
                <button id="prev-btn" style="padding: 8px 16px; border-radius: 4px; border: 1px solid #ccc; background: white; cursor: pointer;">Previous</button>
                <span id="page-info" style="font-size: 14px; font-weight: 600; color: #555;">Page 1 of 1</span>
                <button id="next-btn" style="padding: 8px 16px; border-radius: 4px; border: 1px solid #ccc; background: white; cursor: pointer;">Next</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
